<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>window.CSRF_TOKEN = "{{ csrf_token() }}";</script>
  <script src="{{ url_for('static', filename='csrf.js') }}"></script>
</head>
<body>
  <div class="dashboard">
    <!-- Top Bar -->
    <div class="card">
    <header class="top-bar enter-top-bar">
      <div class="clock-section">
        <div class="time" id="time">--:--:--</div>
        <div class="date-info">
          <span id="date">----&#24180;--&#26376;--&#26085;</span>
          <span id="weekday">&#26143;&#26399;-</span>
        </div>
      </div>
      <div class="top-right-group">
        <div class="weather-card" id="weather-card">
          <div class="weather-left">
            <span class="weather-emoji" id="weather-emoji">--</span>
            <span class="weather-temp" id="weather-temp">--&deg;</span>
          </div>
          <div class="weather-right">
            <span class="weather-desc" id="weather-desc">&#21152;&#36733;&#20013;...</span>
            <span class="weather-detail" id="weather-detail"></span>
          </div>
        </div>
        <div class="term-info" id="term-info-container">
          <span id="term-info">&#21152;&#36733;&#20013;...</span>
          <button class="term-refresh-btn" onclick="refreshTerm()" title="&#20174;&#26657;&#21382;&#39029;&#38754;&#21047;&#26032;">&#x21bb;</button>
        </div>
      </div>
    </header>
    </div>

    <!-- Main Content -->
    <main>
      <section class="column main-column">
        <!-- Unified Main Card -->
        <div class="card enter-main-card">
          <div class="section-header">
            <h2>&#24453;&#21150;&#28165;&#21333;</h2>
            <div class="header-right">
              <div class="header-info">
                <span class="last-updated" id="list-updated"></span>
                <button class="btn-refresh" id="btn-refresh" title="&#21047;&#26032;">&#x21bb;</button>
              </div>
              <button type="button" class="login-trigger" onclick="toggleLoginCards()">
                <span id="login-trigger-label">&#31995;&#32479;&#30331;&#24405;</span>
                <span class="login-trigger-arrow" id="login-trigger-arrow">&#x25b6;</span>
              </button>
              <div class="account-row">
                <span>{{ username }}</span>
                <a href="#" onclick="doLogout();return false;">&#36864;&#20986;&#30331;&#24405;</a>
              </div>
            </div>
          </div>

        <!-- Platform connection cards (collapsible) -->
        <div class="login-cards hidden" id="login-cards">
          <a href="/login/canvas" class="login-card" data-platform="canvas">
            <span class="login-card-title">Canvas</span>
            <span class="login-card-status" id="card-status-canvas">&#26816;&#26597;&#20013;...</span>
          </a>
          <a href="/login/haoke" class="login-card" data-platform="haoke">
            <span class="login-card-title">&#22909;&#35838;</span>
            <span class="login-card-status" id="card-status-haoke">&#26816;&#26597;&#20013;...</span>
          </a>
          <a href="/login/zhixuemeng" class="login-card" data-platform="zhixuemeng">
            <span class="login-card-title">&#26234;&#23398;&#30431;</span>
            <span class="login-card-status" id="card-status-zhixuemeng">&#26816;&#26597;&#20013;...</span>
          </a>
          <a href="/login/zhihuishu" class="login-card" data-platform="zhihuishu">
            <span class="login-card-title">&#26234;&#24935;&#26641;</span>
            <span class="login-card-status" id="card-status-zhihuishu">&#26816;&#26597;&#20013;...</span>
          </a>
        </div>

        <!-- Add custom todo -->
        <form class="add-todo-form" id="add-todo-form" style="margin-bottom: 0;">
          <input type="text" id="new-todo-input" placeholder="&#28155;&#21152;&#26032;&#24453;&#21150;..." autocomplete="off">
          <input type="date" id="new-todo-due" class="date-input" aria-label="截止日期" title="截止日期">
          <button type="submit">+</button>
        </form>

        <!-- Stats Bar -->
        <div class="stats-bar" id="stats-bar">
          <div class="stat-item">
            <span>&#24453;&#23436;&#25104;</span>
            <span class="stat-count" id="stat-total">0</span>
            <span>&#39033;</span>
          </div>
          <div class="stat-item">
            <span>&#21363;&#23558;&#21040;&#26399;</span>
            <span class="stat-count urgent" id="stat-urgent">0</span>
            <span>&#39033;</span>
          </div>
        </div>

        <hr class="section-divider">

        <!-- Unified todo list -->
        <div class="todo-list" id="todo-list">
          <div class="empty-state">&#21152;&#36733;&#20013;...</div>
        </div>
        </div><!-- /.card -->

      </section>
    </main>
  </div>

  <script>
    // ---- Clock ----
    let serverTime = null;
    let clockStart = null;

    async function initClock() {
      const resp = await fetch('/api/clock');
      const data = await resp.json();
      serverTime = new Date(data.iso).getTime();
      clockStart = Date.now();
      updateClock(data);
    }

    function updateClock(data) {
      document.getElementById('time').textContent = data.time;
      document.getElementById('date').textContent = data.date;
      document.getElementById('weekday').textContent = data.weekday;
    }

    function tickClock() {
      if (!serverTime) { initClock(); return; }
      const elapsed = Date.now() - clockStart;
      const now = new Date(serverTime + elapsed);
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('time').textContent = `${h}:${m}:${s}`;
    }

    setInterval(() => { initClock(); }, 10 * 60 * 1000);
    setInterval(tickClock, 1000);

    // ---- Weather ----
    async function fetchWeather() {
      try {
        const resp = await fetch('/api/weather');
        const data = await resp.json();
        if (data.ok) {
          document.getElementById('weather-emoji').textContent = data.weather_emoji;
          document.getElementById('weather-temp').textContent = `${data.temperature}\u00b0C`;
          document.getElementById('weather-desc').textContent = data.weather_desc;
          document.getElementById('weather-detail').textContent =
            `\u6e7f\u5ea6 ${data.humidity}% \u00b7 \u98ce\u901f ${data.wind_speed} m/s`;
        }
      } catch (e) { console.error('Weather fetch failed:', e); }
    }

    async function fetchTerm() {
      try {
        const resp = await fetch('/api/term');
        const data = await resp.json();
        if (data.ok) {
          const holidayHint = data.is_holiday
            ? ` \u00b7 ${data.holiday_name}`
            : '';
          document.getElementById('term-info').textContent =
            `${data.term} \u7b2c ${data.week} \u5468${holidayHint}`;
        } else {
          document.getElementById('term-info').textContent = '\u5b66\u671f\u4fe1\u606f\u83b7\u53d6\u5931\u8d25';
        }
      } catch (e) {
        document.getElementById('term-info').textContent = '\u5b66\u671f\u4fe1\u606f\u52a0\u8f7d\u5931\u8d25';
      }
    }

    async function refreshTerm() {
      const btn = document.querySelector('.term-refresh-btn');
      btn.disabled = true;
      btn.textContent = '...';
      try {
        const resp = await fetch('/api/term/refresh', { method: 'POST' });
        const data = await resp.json();
        if (data.ok) {
          await fetchTerm();
        } else {
          alert('\u5237\u65b0\u5931\u8d25: ' + (data.error || '\u672a\u77e5\u9519\u8bef'));
        }
      } catch (e) {
        alert('\u5237\u65b0\u5931\u8d25: \u7f51\u7edc\u9519\u8bef');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Refresh';
      }
    }

    // Initial fetches

    // ---- Unified Todo Data ----
    let canvasItems = [];
    let customItems = [];
    let expandedSubtaskKeys = [];
    let openMobileActionItemId = null;
    let hiddenIds = [];
    let highlightedIds = [];

    let haokeItems = [];
    let haokeHiddenIds = [];
    let haokeHighlightedIds = [];

    let zhixuemengItems = [];
    let zhixuemengHiddenIds = [];
    let zhixuemengHighlightedIds = [];
    let zhihuishuItems = [];
    let zhihuishuHiddenIds = [];
    let zhihuishuHighlightedIds = [];
    let canvasDeletedIds = [];
    let haokeDeletedIds = [];
    let zhixuemengDeletedIds = [];
    let zhihuishuDeletedIds = [];

    let firstItemRender = true;
    setTimeout(() => { firstItemRender = false; }, 2800);

    // ---- Platform connection card status ----
    function setCardStatus(platform, text, cls) {
      const el = document.getElementById(`card-status-${platform}`);
      if (!el) return;
      el.textContent = text;
      el.classList.remove('connected', 'attention');
      if (cls) el.classList.add(cls);
    }

    function toggleLoginCards() {
      const body = document.getElementById('login-cards');
      const arrow = document.getElementById('login-trigger-arrow');
      body.classList.toggle('hidden');
      arrow.innerHTML = body.classList.contains('hidden') ? '&#x25b6;' : '&#x25bc;';
    }

    async function doLogout() {
      try {
        await fetch('/api/auth/logout', { method: 'POST' });
      } catch (e) { /* ignore */ }
      window.location.href = '/login';
    }

    async function fetchCanvasTodos() {
      const updatedEl = document.getElementById('list-updated');

      try {
        const resp = await fetch('/api/canvas/todos');
        const result = await resp.json();

        if (result.need_setup) {
          setCardStatus('canvas', 'setup');
          updatedEl.textContent = 'setup';
          canvasItems = [];
          hiddenIds = [];
          highlightedIds = [];
          renderUnifiedList();
          return;
        }

        if (!result.ok) {
          setCardStatus('canvas', result.error || '\u83b7\u53d6\u5931\u8d25', 'attention');
        } else {
          setCardStatus('canvas', 'connected', 'connected');
        }

        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        updatedEl.textContent = result.cached
          ? `\u7f13\u5b58\u6570\u636e \u00b7 ${timeStr}`
          : `\u5df2\u66f4\u65b0 \u00b7 ${timeStr}`;

        canvasItems = result.data || [];
        hiddenIds = result.hidden || [];
        highlightedIds = result.highlighted || [];
        canvasDeletedIds = result.deleted || [];
        renderUnifiedList();
      } catch (e) {
        setCardStatus('canvas', '\u7f51\u7edc\u9519\u8bef', 'attention');
      }
    }

    function sortSubtasks(subtasks) {
      return [...subtasks].sort((a, b) => {
        if (a.done === b.done) return 0;
        return a.done ? 1 : -1;
      });
    }

    function setNewTodoDueDefault(today) {
      const dueInput = document.getElementById('new-todo-due');
      if (dueInput && !dueInput.value) dueInput.value = today;
    }

    function toggleMobileActions(itemId) {
      openMobileActionItemId = openMobileActionItemId === itemId ? null : itemId;
      renderUnifiedList();
    }

    async function fetchCustomTodos() {
      try {
        const resp = await fetch('/api/custom/todos');
        const result = await resp.json();
        customItems = result.data || [];
        customItems.forEach(todo => {
          if (todo.subtasks) {
            todo.subtasks.forEach((subtask, idx) => {
              if (subtask.id == null) {
                subtask.id = idx + 1;
              }
            });
            todo.subtasks = sortSubtasks(todo.subtasks);
          }
        });
        window.customToday = result.today || new Date().toISOString().split('T')[0];
        setNewTodoDueDefault(window.customToday);
        renderUnifiedList();
      } catch (e) {
        console.error('Failed to fetch custom todos:', e);
        window.customToday = window.customToday || new Date().toISOString().split('T')[0];
        setNewTodoDueDefault(window.customToday);
      }
    }

    function renderUnifiedList() {
      const container = document.getElementById('todo-list');

      // Build unified items
      let unified = [];

      canvasItems.forEach(item => {
        if (canvasDeletedIds.includes(item.id)) return;
        const isHidden = hiddenIds.includes(item.id);
        const isHighlighted = highlightedIds.includes(item.id);
        unified.push({
          id: `c${item.id}`,
          source: 'canvas',
          title: item.title,
          course: item.course,
          due_str: item.due_str,
          due_ts: item.due_ts,
          type: item.type,
          url: item.url,
          done: isHidden,
          hidden: isHidden,
          highlighted: isHighlighted,
          rawId: item.id,
          manualHighlighted: isHighlighted,
          subtasks: item.subtasks || [],
        });
      });

      haokeItems.forEach(item => {
        if (haokeDeletedIds.includes(item.id)) return;
        const isHidden = haokeHiddenIds.includes(item.id);
        const isHighlighted = haokeHighlightedIds.includes(item.id);
        unified.push({
          id: `h${item.id}`,
          source: 'haoke',
          title: item.title,
          course: item.course,
          due_str: item.due_str,
          due_ts: item.due_ts,
          type: item.type,
          url: item.url,
          done: isHidden,
          hidden: isHidden,
          highlighted: isHighlighted,
          rawId: item.id,
          manualHighlighted: isHighlighted,
          subtasks: item.subtasks || [],
        });
      });

      zhixuemengItems.forEach(item => {
        if (zhixuemengDeletedIds.includes(item.id)) return;
        const isHidden = zhixuemengHiddenIds.includes(item.id);
        const isHighlighted = zhixuemengHighlightedIds.includes(item.id);
        unified.push({
          id: `z${item.id}`,
          source: 'zhixuemeng',
          title: item.title,
          course: item.course,
          due_str: item.due_str,
          due_ts: item.due_ts,
          type: item.type,
          url: item.url,
          done: isHidden,
          hidden: isHidden,
          highlighted: isHighlighted,
          rawId: item.id,
          manualHighlighted: isHighlighted,
          subtasks: item.subtasks || [],
        });
      });

      zhihuishuItems.forEach(item => {
        if (zhihuishuDeletedIds.includes(item.id)) return;
        const isHidden = zhihuishuHiddenIds.includes(item.id);
        const isHighlighted = zhihuishuHighlightedIds.includes(item.id);
        unified.push({
          id: `s${item.id}`,
          source: 'zhihuishu',
          title: item.title,
          course: item.course,
          due_str: item.due_str,
          due_ts: item.due_ts,
          type: item.type || 'zhihuishu',
          url: item.url,
          done: isHidden,
          hidden: isHidden,
          highlighted: isHighlighted,
          rawId: item.id,
          manualHighlighted: isHighlighted,
          subtasks: item.subtasks || [],
        });
      });

      customItems.forEach(item => {
        const today = window.customToday || new Date().toISOString().split('T')[0];
        const isOverdue = item.due_date && item.due_date < today && !item.done;
        const displayHighlighted = (item.highlighted || isOverdue) && !item.done;
        unified.push({
          id: `x${item.id}`,
          source: 'custom',
          title: item.text,
          course: '',
          labels: item.labels || [],
          due_str: item.due_date || '',
          due_ts: item.due_date ? `${item.due_date}T00:00:00` : null,
          type: '\u81ea\u5b9a\u4e49',
          url: '',
          done: item.done,
          hidden: false,
          highlighted: displayHighlighted,
          rawId: item.id,
          manualHighlighted: item.highlighted || false,
          subtasks: item.subtasks || [],
        });
      });

      // Sort
      unified.sort((a, b) => {
        if (a.done !== b.done) return a.done ? 1 : -1;
        if (a.due_ts && !b.due_ts) return -1;
        if (!a.due_ts && b.due_ts) return 1;
        if (a.due_ts && b.due_ts) return a.due_ts.localeCompare(b.due_ts);
        return 0;
      });

      if (unified.length === 0) {
        container.innerHTML = '<div class="empty-state">&#27809;&#26377;&#24453;&#21150;&#20107;&#39033;</div>';
        return;
      }

      const doAnimate = firstItemRender && unified.length > 0;

      container.innerHTML = unified.map((item, idx) => {
        const isDismissed = item.done || item.hidden;
        const manualFlag = item.manualHighlighted || false;

        let urgencyClass = '';
        if (!isDismissed) {
          if (item.due_ts) {
            const dueTime = new Date(item.due_ts).getTime();
            const hoursLeft = (dueTime - Date.now()) / 3600000;
            if (hoursLeft <= 24) urgencyClass = 'urgent';
            else if (hoursLeft <= 72) urgencyClass = 'approaching';
          } else {
            urgencyClass = 'remote';
          }
        }

        const flagIcon = manualFlag ? '&#x2691;' : '&#x2690;';
        const flagTitle = manualFlag ? '\u53d6\u6d88\u6807\u7ea2' : '\u6807\u7ea2';
        const flagClass = manualFlag ? 'btn-flag active' : 'btn-flag';
        const dismissTitle = isDismissed ? (item.source === 'custom' ? '\u53d6\u6d88\u5b8c\u6210' : '\u53d6\u6d88\u9690\u85cf') : (item.source === 'custom' ? '\u5b8c\u6210' : '\u9690\u85cf');

        let actionsHtml = '';
        if (item.source === 'canvas') {
          actionsHtml = `
            <button class="${flagClass}" onclick="toggleHighlight('${item.id}', ${manualFlag})" title="${flagTitle}">${flagIcon}</button>
            <button class="btn-dismiss" onclick="toggleHide('${item.id}', ${isDismissed})" title="${dismissTitle}">&times;</button>
            <button class="btn-delete" onclick="toggleCanvasDelete(${item.rawId})" title="\u5220\u9664">&#x1f5d1;</button>
          `;
        } else if (item.source === 'haoke') {
          actionsHtml = `
            <button class="${flagClass}" onclick="toggleHaokeHighlight('${item.id}', ${manualFlag})" title="${flagTitle}">${flagIcon}</button>
            <button class="btn-dismiss" onclick="toggleHaokeHide('${item.id}', ${isDismissed})" title="${dismissTitle}">&times;</button>
            <button class="btn-delete" onclick="toggleHaokeDelete(${item.rawId})" title="\u5220\u9664">&#x1f5d1;</button>
          `;
        } else if (item.source === 'custom') {
          actionsHtml = `
            <button class="${flagClass}" onclick="toggleCustomHighlight(${item.rawId}, ${manualFlag})" title="${flagTitle}">${flagIcon}</button>
            <button class="btn-dismiss" onclick="toggleTodoCheck(${item.rawId}, ${item.done})" title="${dismissTitle}">&times;</button>
            <button class="btn-delete" onclick="toggleCustomDelete(${item.rawId})" title="\u5220\u9664">&#x1f5d1;</button>
          `;
        } else if (item.source === 'zhixuemeng') {
          actionsHtml = `
            <button class="${flagClass}" onclick="toggleZhixuemengHighlight('${item.id.substring(1)}', ${manualFlag})" title="${flagTitle}">${flagIcon}</button>
            <button class="btn-dismiss" onclick="toggleZhixuemengHide('${item.id.substring(1)}', ${isDismissed})" title="${dismissTitle}">&times;</button>
            <button class="btn-delete" onclick="toggleZhixuemengDelete('${item.id.substring(1)}')" title="\u5220\u9664">&#x1f5d1;</button>
          `;
        } else if (item.source === 'zhihuishu') {
          actionsHtml = `
            <button class="${flagClass}" onclick="toggleZhihuishuHighlight('${item.rawId}', ${manualFlag})" title="${flagTitle}">${flagIcon}</button>
            <button class="btn-dismiss" onclick="toggleZhihuishuHide('${item.rawId}', ${isDismissed})" title="${dismissTitle}">&times;</button>
            <button class="btn-delete" onclick="toggleZhihuishuDelete('${item.rawId}')" title="\u5220\u9664">&#x1f5d1;</button>
          `;
        }

        const titleHtml = item.url
          ? `<a class="item-title" href="${item.url}" target="_blank" title="${escapeHtml(item.title)}">${escapeHtml(item.title)}</a>`
          : item.source === 'custom'
            ? `<span class="item-title item-title-plain editable-title" data-id="${item.rawId}" data-field="text">${escapeHtml(item.title)}</span>`
            : `<span class="item-title item-title-plain">${escapeHtml(item.title)}</span>`;

        const dueHtml = item.source === 'custom'
          ? `<span class="item-due editable-due" data-id="${item.rawId}" data-field="due_date">${item.due_str}</span>`
          : `<span class="item-due">${item.due_str}</span>`;
          
        const labelsHtml = item.labels && item.labels.length > 0
          ? `<div class="item-labels">${item.labels.map(label => `<span class="label-badge">${escapeHtml(label)}</span>`).join('')}</div>`
          : '';

        const subtasks = item.subtasks || [];
        const subtaskKey = JSON.stringify([item.source, String(item.rawId)]);
        const isSubtaskExpanded = expandedSubtaskKeys.includes(subtaskKey);
        const subtaskToggleLabel = isSubtaskExpanded ? '\u6536\u8d77\u5b50\u4efb\u52a1' : '\u5c55\u5f00\u5b50\u4efb\u52a1';
        const subtaskToggleIcon = isSubtaskExpanded ? '&#x25be;' : '&#x25b8;';
        const sourceArg = inlineJson(item.source);
        const todoIdArg = inlineJson(item.rawId);
        const subtaskToggleHtml = `<button class="subtask-toggle" onclick="toggleSubtasks(${sourceArg}, ${todoIdArg})" title="${subtaskToggleLabel}" aria-label="${subtaskToggleLabel}">${subtaskToggleIcon}</button>`;
        const mobileActionsOpen = openMobileActionItemId === item.id;

        const animAttr = doAnimate ? `enter-item" style="animation-delay:${0.34 + idx * 0.04}s` : '';

        const rowHtml = `
          <div class="todo-item unified-item ${urgencyClass} ${manualFlag ? 'manual-flagged' : ''} ${isDismissed ? 'dismissed' : ''} ${animAttr}">
            <span class="item-source-badge src-${item.source}">${item.type}</span>
            ${titleHtml}
            ${item.course ? `<span class="item-course">${escapeHtml(item.course)}</span>` : ''}
            ${labelsHtml}
            ${dueHtml}
            <span class="item-subtask-slot">${subtaskToggleHtml}</span>
            <span class="item-desktop-actions">${actionsHtml}</span>
            <button class="mobile-action-trigger" onclick="toggleMobileActions('${item.id}')" aria-label="更多操作" aria-expanded="${mobileActionsOpen}">•••</button>
            <span class="item-mobile-actions ${mobileActionsOpen ? 'open' : ''}">${actionsHtml}</span>
          </div>
        `;

        const panelHtml = isSubtaskExpanded ? renderSubtaskPanel(item.source, item.rawId, subtasks) : '';
        const previewHtml = '';
        return `
          <div class="unified-item-wrap"${idx === 0 ? ' style="border-top:none"' : ''}>
            ${rowHtml}
            ${previewHtml}
            ${panelHtml}
          </div>
        `;
      }).join('');

      if (doAnimate) firstItemRender = false;

      // Update stats bar
      updateStatsBar(unified);
    }

    function updateStatsBar(unified) {
      const pending = unified.filter(item => !item.done && !item.hidden).length;
      let urgent = 0;
      unified.forEach(item => {
        if (item.done || item.hidden) return;
        if (item.due_ts) {
          const hoursLeft = (new Date(item.due_ts).getTime() - Date.now()) / 3600000;
          if (hoursLeft <= 72) urgent++;
        }
      });
      document.getElementById('stat-total').textContent = pending;
      document.getElementById('stat-urgent').textContent = urgent;
    }

    function renderUpcomingSubtasksPreview(subtasks) {
      const today = window.customToday || new Date().toISOString().split('T')[0];
      const d = new Date(today + 'T00:00:00');
      d.setDate(d.getDate() + 1);
      const tomorrow = d.toISOString().split('T')[0];

      const upcoming = subtasks.filter(st => {
        if (st.done) return false;
        if (!st.due_date) return false;
        return st.due_date === today || st.due_date === tomorrow;
      });

      if (upcoming.length === 0) return '';

      const parts = upcoming.map(st => {
        let label;
        if (st.due_date === today) label = '\u4eca\u5929';
        else if (st.due_date === tomorrow) label = '\u660e\u5929';
        else {
          const dt = new Date(st.due_date + 'T00:00:00');
          label = `${dt.getMonth() + 1}/${dt.getDate()}`;
        }
        return `<span class="upcoming-subtask-item">${escapeHtml(st.text)} <span class="upcoming-subtask-due">${label}</span></span>`;
      }).join('<span class="upcoming-subtask-sep"> &middot; </span>');

      return `<div class="subtask-upcoming-preview">+ ${parts}</div>`;
    }

    function renderSubtaskPanel(source, todoId, subtasks) {
      const rowsHtml = subtasks.map((subtask, idx) => {
        const sid = subtask.id != null ? subtask.id : idx;
        const sourceArg = inlineJson(source);
        const todoIdArg = inlineJson(todoId);
        const subtaskIdArg = inlineJson(sid);
        return `
        <div class="subtask-row">
          <input type="checkbox" ${subtask.done ? 'checked' : ''} onchange="toggleSubtaskDone(${sourceArg}, ${todoIdArg}, ${subtaskIdArg})">
          <span class="subtask-text ${subtask.done ? 'done' : ''}" onclick="startSubtaskEdit(${sourceArg}, ${todoIdArg}, ${subtaskIdArg}, this)">${escapeHtml(subtask.text)}</span>
          <input type="date" class="subtask-due-input" value="${escapeAttribute(subtask.due_date || '')}" onchange="handleSubtaskDueChange(${sourceArg}, ${todoIdArg}, ${subtaskIdArg}, this.value)" title="\u622a\u6b62\u65e5\u671f">
          <button class="subtask-delete" onclick="deleteSubtask(${sourceArg}, ${todoIdArg}, ${subtaskIdArg})" title="delete subtask">x</button>
        </div>
      `;
      }).join('');

      return `
        <div class="subtask-panel">
          ${rowsHtml || '<div class="subtask-empty">\u8fd8\u6ca1\u6709\u5b50\u4efb\u52a1</div>'}
          <input class="subtask-add-input" placeholder="\u6dfb\u52a0\u5b50\u4efb\u52a1..." onkeydown="handleSubtaskAddKey(event, ${inlineJson(source)}, ${inlineJson(todoId)})">
        </div>
      `;
    }

    // ---- Custom Todos CRUD ----
    function sourceItems(source) {
      if (source === 'canvas') return canvasItems;
      if (source === 'haoke') return haokeItems;
      if (source === 'zhixuemeng') return zhixuemengItems;
      if (source === 'zhihuishu') return zhihuishuItems;
      return source === 'custom' ? customItems : [];
    }

    function findSubtaskTodo(source, todoId) {
      return sourceItems(source).find(item => String(item.id) === String(todoId));
    }

    function toggleSubtasks(source, todoId) {
      const key = JSON.stringify([source, String(todoId)]);
      if (expandedSubtaskKeys.includes(key)) {
        expandedSubtaskKeys = expandedSubtaskKeys.filter(item => item !== key);
      } else {
        expandedSubtaskKeys.push(key);
      }
      renderUnifiedList();
    }

    function handleSubtaskAddKey(event, source, todoId) {
      if (event.key === 'Enter') {
        addSubtask(source, todoId, event.target.value);
      } else if (event.key === 'Escape') {
        event.target.value = '';
        event.target.blur();
      }
    }

    async function refreshSubtaskSource(source) {
      if (source === 'canvas') return fetchCanvasTodos();
      if (source === 'haoke') return fetchHaokeTodos();
      if (source === 'zhixuemeng') return fetchZhixuemengTodos();
      if (source === 'zhihuishu') return fetchZhihuishuTodos();
      return fetchCustomTodos();
    }

    async function saveSubtasks(source, todoId, subtasks) {
      try {
        const todo = findSubtaskTodo(source, todoId);
        let resp;
        let data;
        if (source === 'custom') {
          const payload = { subtasks };
          if (todo && todo.updated_at) payload.updated_at = todo.updated_at;
          resp = await fetch(`/api/custom/todos/${todoId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (!resp.ok) throw new Error('save failed');
          data = await resp.json();
        } else {
          const payload = {
            source,
            item_id: todoId,
            subtasks,
            updated_at: todo ? (todo.subtasks_updated_at ?? null) : null,
          };
          resp = await fetch('/api/external-subtasks', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (resp.status === 409) {
            await refreshSubtaskSource(source);
            return;
          }
          if (!resp.ok) throw new Error('save failed');
          data = await resp.json();
        }

        if (todo) {
          todo.subtasks = data.subtasks || subtasks;
          if (source === 'custom' && data.todo && data.todo.updated_at) todo.updated_at = data.todo.updated_at;
          if (source !== 'custom' && data.updated_at) todo.subtasks_updated_at = data.updated_at;
        }
        renderUnifiedList();
      } catch (e) {
        alert('\u4fdd\u5b58\u5931\u8d25');
        await refreshSubtaskSource(source);
      }
    }

    function subtaskId(subtask, index) {
      return subtask.id != null ? subtask.id : index;
    }

    async function addSubtask(source, todoId, text) {
      const trimmed = text.trim();
      if (!trimmed) return;

      const todo = findSubtaskTodo(source, todoId);
      if (!todo) return;

      const currentSubtasks = todo.subtasks || [];
      const newId = Math.max(0, ...currentSubtasks.map(subtask => Number(subtask.id) || 0)) + 1;
      const subtasks = [
        ...currentSubtasks,
        { id: newId, text: trimmed, done: false },
      ];
      await saveSubtasks(source, todoId, sortSubtasks(subtasks));
    }

    async function toggleSubtaskDone(source, todoId, subtaskIdValue) {
      const todo = findSubtaskTodo(source, todoId);
      if (!todo) return;

      const sid = String(subtaskIdValue);
      const subtasks = (todo.subtasks || []).map((subtask, idx) => {
        const id = subtaskId(subtask, idx);
        const identifiedSubtask = subtask.id == null ? { ...subtask, id } : subtask;
        return String(id) === sid ? { ...identifiedSubtask, done: !subtask.done } : identifiedSubtask;
      });
      await saveSubtasks(source, todoId, sortSubtasks(subtasks));
    }

    async function deleteSubtask(source, todoId, subtaskIdValue) {
      const todo = findSubtaskTodo(source, todoId);
      if (!todo) return;

      const sid = String(subtaskIdValue);
      const subtasks = (todo.subtasks || []).filter((subtask, idx) => String(subtaskId(subtask, idx)) !== sid);
      await saveSubtasks(source, todoId, sortSubtasks(subtasks));
    }

    async function handleSubtaskDueChange(source, todoId, subtaskIdValue, dueDate) {
      const todo = findSubtaskTodo(source, todoId);
      if (!todo) return;

      const sid = String(subtaskIdValue);
      const subtasks = (todo.subtasks || []).map((subtask, idx) => {
        return String(subtaskId(subtask, idx)) === sid ? { ...subtask, due_date: dueDate || null } : subtask;
      });
      await saveSubtasks(source, todoId, sortSubtasks(subtasks));
    }

    function startSubtaskEdit(source, todoId, subtaskIdValue, spanEl) {
      const todo = findSubtaskTodo(source, todoId);
      if (!todo) return;

      const sid = String(subtaskIdValue);
      const subtask = (todo.subtasks || []).find((item, idx) => String(subtaskId(item, idx)) === sid);
      if (!subtask) return;

      const originalText = subtask.text;
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'subtask-edit-input';
      input.value = originalText;
      spanEl.replaceWith(input);
      input.focus();
      input.select();

      let finished = false;
      async function finish(save) {
        if (finished) return;
        finished = true;
        const nextText = input.value.trim();
        if (!save || !nextText || nextText === originalText) {
          renderUnifiedList();
          return;
        }

        const subtasks = (todo.subtasks || []).map((item, idx) => {
          return String(subtaskId(item, idx)) === sid ? { ...item, text: nextText } : item;
        });
        await saveSubtasks(source, todoId, sortSubtasks(subtasks));
      }

      input.addEventListener('keydown', event => {
        if (event.key === 'Enter') finish(true);
        if (event.key === 'Escape') finish(false);
      });
      input.addEventListener('blur', () => finish(true));
    }

    async function addTodo(e) {
      e.preventDefault();
      const input = document.getElementById('new-todo-input');
      const dueInput = document.getElementById('new-todo-due');
      const text = input.value.trim();
      if (!text) return;

      let labels = [];
      const parts = text.split(/\s+(#[^#\s]+)/);
      let taskText = parts[0];
      if (parts.length > 1) {
        taskText = parts[0].trim();
        labels = parts.slice(1).map(tag => tag.substring(1)).filter(tag => tag); // 绉婚櫎#绗﹀彿
      }

      const resp = await fetch('/api/custom/todos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text: taskText,
          due_date: dueInput.value,
          labels: labels  // 娣诲姞鏍囩
        }),
      });
      if (resp.ok) {
        input.value = '';
        dueInput.value = '';
        setNewTodoDueDefault(window.customToday || new Date().toISOString().split('T')[0]);
        fetchCustomTodos();
      } else {
        const err = await resp.json().catch(() => ({}));
        alert('add failed: ' + (err.error || 'unknown error'));
      }
    }

    async function saveInlineEdit(id, field, value) {
      const item = customItems.find(t => t.id === id);
      if (item) {
        if (field === 'multi') {
          item.text = value.text;
          item.labels = value.labels;
        } else if (field === 'text') {
          item.text = value;
        } else if (field === 'due_date') {
          item.due_date = value || null;
        } else if (field === 'labels') {
          item.labels = value; // 鏀寔鏍囩
        }
      }
      const payload = {};
      if (field === 'multi') {
        payload.text = value.text;
        payload.labels = value.labels;
      } else {
        payload[field] = value;
      }
      await fetch(`/api/custom/todos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      renderUnifiedList();
    }

    function startInlineEdit(spanEl, field) {
      const id = parseInt(spanEl.dataset.id);
      const originalValue = spanEl.textContent.trim();

      const input = document.createElement('input');
      input.type = field === 'due_date' ? 'date' : 'text';
      input.className = field === 'due_date' ? 'inline-edit-date-input' : 'inline-edit-input';

      if (field === 'due_date' && originalValue) {
        input.value = originalValue;
      } else {
        input.value = originalValue;
      }

      spanEl.replaceWith(input);
      input.focus();
      if (input.type === 'text') input.select();

      function commit() {
        const newValue = input.value.trim();
        if (newValue !== originalValue) {
          // 濡傛灉鏄紪杈戜换鍔℃爣棰橈紝妫€鏌ユ槸鍚︽湁鏍囩
          if (field === 'text') {
            const parts = newValue.split(/\s+(#[^#\s]+)/);
            let taskText = parts[0];
            let labels = [];
            if (parts.length > 1) {
              taskText = parts[0].trim();
              labels = parts.slice(1).map(tag => tag.substring(1)).filter(tag => tag);
            }
            
            // 鍚堝苟涓轰竴娆¤姹傦紝閬垮厤绔炴€佹潯浠?            saveInlineEdit(id, 'multi', { text: taskText, labels });
          } else {
            saveInlineEdit(id, field, newValue);
          }
        } else {
          const newSpan = document.createElement('span');
          newSpan.className = spanEl.className;
          newSpan.dataset.id = spanEl.dataset.id;
          newSpan.dataset.field = spanEl.dataset.field;
          newSpan.textContent = originalValue;
          input.replaceWith(newSpan);
        }
      }

      function cancel() {
        input.replaceWith(spanEl);
      }

      input.addEventListener('blur', commit);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { e.preventDefault(); cancel(); }
      });
    }


    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeAttribute(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function inlineJson(value) {
      return JSON.stringify(value)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;');
    }

    // ---- Init ----
    document.getElementById('add-todo-form').addEventListener('submit', addTodo);
    document.getElementById('btn-refresh').addEventListener('click', () => { fetchCanvasTodos(); fetchHaokeTodos(); fetchZhixuemengTodos(); fetchZhihuishuTodos(); });

    document.getElementById('todo-list').addEventListener('click', function(e) {
      const titleEl = e.target.closest('.editable-title');
      if (titleEl) { startInlineEdit(titleEl, 'text'); return; }
      const dueEl = e.target.closest('.editable-due');
      if (dueEl) { startInlineEdit(dueEl, 'due_date'); return; }
    });

    initClock();

    fetchTerm();
    fetchCanvasTodos();
    fetchCustomTodos();
    fetchHaokeTodos();
    fetchZhixuemengTodos();
    fetchZhihuishuTodos();

    setInterval(fetchCanvasTodos, 30 * 60 * 1000);
    setInterval(fetchHaokeTodos, 30 * 60 * 1000);
    setInterval(fetchZhixuemengTodos, 30 * 60 * 1000);
    setInterval(fetchZhihuishuTodos, 30 * 60 * 1000);
    setInterval(fetchTerm, 60 * 1000);
    setInterval(fetchWeather, 60 * 60 * 1000);
