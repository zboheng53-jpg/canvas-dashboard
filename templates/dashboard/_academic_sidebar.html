<aside class="academic-sidebar" id="academic-sidebar" aria-label="主导航" aria-hidden="false">
  <div class="sidebar-heading">
    <div class="sidebar-brand">
      <span class="sidebar-brand-mark {% if is_night %}is-night{% else %}is-daytime{% endif %}" id="sidebar-greeting-icon" aria-hidden="true">{{ greeting_icon or "☀" }}</span>
      <span class="sidebar-brand-copy">
        <strong id="sidebar-greeting" data-username="{{ username }}">{{ greeting_text or "早上好" }}，{{ username }}</strong>
      </span>
    </div>
    <button
      type="button"
      class="sidebar-collapse-toggle"
      id="sidebar-collapse-toggle"
      aria-label="收起侧栏"
      aria-expanded="true"
      onclick="toggleSidebarCollapse()"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="m15 18-6-6 6-6"></path>
      </svg>
    </button>
  </div>

  <nav class="sidebar-nav" aria-label="主要入口">
    <button type="button" class="sidebar-nav-item is-active" data-dashboard-view="overview" aria-current="page">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 13h6V4H4v9Zm0 7h6v-4H4v4Zm10 0h6v-9h-6v9Zm0-16v4h6V4h-6Z"></path>
      </svg>
      <span class="sidebar-label">总览</span>
    </button>
    <button type="button" class="sidebar-nav-item" data-dashboard-view="projects">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 6.5h6l1.5 2H20v10H4v-12Z"></path>
      </svg>
      <span class="sidebar-label">项目</span>
    </button>
    <button type="button" class="sidebar-nav-item" data-dashboard-view="schedule">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 5h14v15H5V5Zm3-2v4m8-4v4M5 10h14"></path>
      </svg>
      <span class="sidebar-label">日程管理</span>
    </button>
    <button type="button" class="sidebar-nav-item" data-dashboard-view="sources">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <ellipse cx="12" cy="6" rx="7" ry="3"></ellipse>
        <path d="M5 6v6c0 1.7 3.1 3 7 3s7-1.3 7-3V6M5 12v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6"></path>
      </svg>
      <span class="sidebar-label">数据源</span>
    </button>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-user" title="{{ username }}">
      <span class="sidebar-user-avatar" aria-hidden="true">{{ username[:1] | upper }}</span>
      <span class="sidebar-user-copy">
        <strong>{{ username }}</strong>
      </span>
      <svg class="sidebar-user-chevron" viewBox="0 0 24 24" aria-hidden="true">
        <path d="m8 10 4 4 4-4"></path>
      </svg>
    </div>
    {% if apple_calendar_enabled %}
    <button
      type="button"
      class="sidebar-footer-action calendar-subscription-trigger"
      id="calendar-subscription-trigger"
      aria-controls="calendar-subscription-panel"
      aria-expanded="false"
      onclick="toggleCalendarSubscription()"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="4" y="5" width="16" height="15" rx="2"></rect>
        <path d="M8 3v4m8-4v4M4 10h16m-8 4h4m-2-2v4"></path>
      </svg>
      <span class="sidebar-label">Apple 日历订阅</span>
    </button>
    {% endif %}
    <button type="button" class="sidebar-footer-action" data-dashboard-view="settings">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19 13.5v-3l-2-.7-.7-1.7.9-1.9-2.1-2.1-1.9.9-1.7-.7-.7-2h-3l-.7 2-1.7.7-1.9-.9-2.1 2.1.9 1.9-.7 1.7-2 .7v3l2 .7.7 1.7-.9 1.9 2.1 2.1 1.9-.9 1.7.7.7 2h3l.7-2 1.7-.7 1.9.9 2.1-2.1-.9-1.9.7-1.7 2-.7Z"></path>
      </svg>
      <span class="sidebar-label">设置</span>
    </button>
    <button type="button" class="sidebar-footer-action sidebar-logout" onclick="doLogout()">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M10 5H5v14h5m4-3 4-4-4-4m4 4H9"></path>
      </svg>
      <span class="sidebar-label">退出登录</span>
    </button>
  </div>
</aside>
