<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 · Canvas Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>window.CSRF_TOKEN = "{{ csrf_token() }}";</script>
  <script src="{{ url_for('static', filename='csrf.js') }}"></script>
</head>
<body>
  <div class="dashboard">
    <div class="card enter-main-card">
      <div class="section-header">
        <h2>注册</h2>
      </div>

      <form class="add-todo-form auth-form mb-s" id="register-form">
        <input type="text" id="register-username" placeholder="用户名（3-20位字母/数字/下划线）" autocomplete="username">
        <input type="password" id="register-password" placeholder="密码（至少6位）" autocomplete="new-password">
        <button type="submit" class="btn-wide btn-accent">注册</button>
      </form>

      <p class="setup-hint">已有账号？<a href="/login">直接登录</a></p>

      <div class="error-banner hidden" id="register-error"></div>
    </div>
    {% if icp_number %}
    <footer class="site-footer">
      <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">{{ icp_number }}</a>
    </footer>
    {% endif %}
  </div>

  <script>
    async function doRegister(e) {
      e.preventDefault();
      const username = document.getElementById('register-username').value.trim();
      const password = document.getElementById('register-password').value;
      if (!username || !password) return;

      const btn = document.querySelector('#register-form button');
      btn.textContent = '...';
      btn.disabled = true;

      try {
        const resp = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const result = await resp.json();
        if (result.ok) {
          window.location.href = '/';
        } else {
          document.getElementById('register-error').textContent = result.error || '注册失败';
          document.getElementById('register-error').classList.remove('hidden');
        }
      } catch (e) {
        document.getElementById('register-error').textContent = '网络错误';
        document.getElementById('register-error').classList.remove('hidden');
      } finally {
        btn.textContent = '注册';
        btn.disabled = false;
      }
    }

    document.getElementById('register-form').addEventListener('submit', doRegister);
  </script>
</body>
</html>
